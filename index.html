<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calcul8</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root{
    --bg-deep:#0e0817;
    --bg-card:#1a1028;
    --bg-card-hover:#241538;
    --purple-core:#8b5cf6;
    --purple-glow:#a78bfa;
    --purple-dim:#6d28d9;
    --purple-muted:#4c1d95;
    --accent-hot:#c084fc;
    --accent-rose:#e879f9;
    --text-primary:#f0e7ff;
    --text-muted:#a78bfa;
    --text-dim:#6b5b8a;
    --operator-bg:#2e1a47;
    --operator-hover:#3b2259;
    --equals-bg:linear-gradient(135deg,#7c3aed,#a855f7,#c084fc);
    --btn-radius:14px;
    --transition:180ms cubic-bezier(.4,0,.2,1);
  }

  html,body{
    height:100%;
    font-family:'Outfit',sans-serif;
    background:var(--bg-deep);
    color:var(--text-primary);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }

  body::before{
    content:'';
    position:fixed;
    inset:0;
    background:
      radial-gradient(ellipse 600px 400px at 30% 20%,rgba(139,92,246,.12),transparent),
      radial-gradient(ellipse 500px 500px at 70% 80%,rgba(168,85,247,.08),transparent),
      radial-gradient(ellipse 300px 300px at 50% 50%,rgba(192,132,252,.05),transparent);
    pointer-events:none;
    z-index:0;
  }

  .calculator{
    position:relative;
    z-index:1;
    width:340px;
    background:var(--bg-card);
    border:1px solid rgba(139,92,246,.15);
    border-radius:28px;
    padding:28px 20px 20px;
    box-shadow:
      0 0 0 1px rgba(139,92,246,.06),
      0 25px 60px rgba(0,0,0,.5),
      0 0 120px rgba(139,92,246,.08);
    animation:fadeIn .6s ease-out;
  }

  @keyframes fadeIn{
    from{opacity:0;transform:translateY(20px) scale(.97)}
    to{opacity:1;transform:translateY(0) scale(1)}
  }

  /* Brand */
  .brand{
    font-family:'DM Mono',monospace;
    font-size:11px;
    font-weight:300;
    letter-spacing:4px;
    text-transform:uppercase;
    color:var(--text-dim);
    text-align:center;
    margin-bottom:20px;
  }

  /* Display */
  .display{
    background:rgba(14,8,23,.6);
    border:1px solid rgba(139,92,246,.1);
    border-radius:18px;
    padding:20px 22px 18px;
    margin-bottom:20px;
    min-height:100px;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    align-items:flex-end;
    overflow:hidden;
  }

  .display-expr{
    font-family:'DM Mono',monospace;
    font-size:14px;
    font-weight:300;
    color:var(--text-dim);
    min-height:20px;
    word-break:break-all;
    text-align:right;
    transition:color var(--transition);
  }

  .display-value{
    font-family:'Outfit',sans-serif;
    font-size:42px;
    font-weight:300;
    letter-spacing:-1px;
    color:var(--text-primary);
    line-height:1.1;
    margin-top:6px;
    word-break:break-all;
    text-align:right;
    transition:font-size var(--transition);
  }

  .display-value.small{font-size:28px}
  .display-value.xsmall{font-size:20px}

  /* Button grid */
  .grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
  }

  .btn{
    font-family:'Outfit',sans-serif;
    font-size:18px;
    font-weight:400;
    border:none;
    border-radius:var(--btn-radius);
    height:58px;
    cursor:pointer;
    transition:
      background var(--transition),
      transform 80ms ease,
      box-shadow var(--transition);
    position:relative;
    overflow:hidden;
    -webkit-tap-highlight-color:transparent;
    user-select:none;
  }

  .btn:active{transform:scale(.94)}

  /* Ripple */
  .btn .ripple{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,.15);
    transform:scale(0);
    animation:ripple .5s ease-out;
    pointer-events:none;
  }
  @keyframes ripple{to{transform:scale(3);opacity:0}}

  /* Number buttons */
  .btn-num{
    background:rgba(255,255,255,.04);
    color:var(--text-primary);
    border:1px solid rgba(255,255,255,.04);
  }
  .btn-num:hover{background:rgba(255,255,255,.08)}

  /* Operator buttons */
  .btn-op{
    background:var(--operator-bg);
    color:var(--purple-glow);
    border:1px solid rgba(139,92,246,.12);
    font-size:20px;
  }
  .btn-op:hover{background:var(--operator-hover)}
  .btn-op.active{
    background:var(--purple-dim);
    color:#fff;
    box-shadow:0 0 20px rgba(139,92,246,.3);
  }

  /* Function buttons (AC, +/-, %) */
  .btn-fn{
    background:rgba(139,92,246,.08);
    color:var(--text-muted);
    border:1px solid rgba(139,92,246,.08);
    font-size:15px;
    font-weight:500;
  }
  .btn-fn:hover{background:rgba(139,92,246,.15)}

  /* Equals */
  .btn-eq{
    background:var(--equals-bg);
    color:#fff;
    border:none;
    font-size:22px;
    font-weight:600;
    box-shadow:0 4px 20px rgba(139,92,246,.3);
  }
  .btn-eq:hover{
    box-shadow:0 4px 30px rgba(139,92,246,.45);
    filter:brightness(1.08);
  }

  /* Zero button wider */
  .btn-zero{grid-column:span 2}

  /* Dot on display */
  .dot-cursor{
    display:inline-block;
    width:2px;
    height:36px;
    background:var(--purple-core);
    margin-left:4px;
    vertical-align:middle;
    animation:blink 1s step-end infinite;
    border-radius:1px;
  }
  @keyframes blink{50%{opacity:0}}

  /* Error shake */
  @keyframes shake{
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-6px)}
    40%{transform:translateX(6px)}
    60%{transform:translateX(-4px)}
    80%{transform:translateX(4px)}
  }
  .shake{animation:shake .4s ease}

  /* Keyboard hint */
  .hint{
    font-family:'DM Mono',monospace;
    font-size:10px;
    color:var(--text-dim);
    text-align:center;
    margin-top:16px;
    letter-spacing:1px;
    opacity:.5;
  }
</style>
</head>
<body>

<div class="calculator" id="calc">
  <div class="brand">calcul8</div>

  <div class="display">
    <div class="display-expr" id="expr"></div>
    <div class="display-value" id="value">0</div>
  </div>

  <div class="grid">
    <button class="btn btn-fn" data-action="clear">AC</button>
    <button class="btn btn-fn" data-action="sign">+/&minus;</button>
    <button class="btn btn-fn" data-action="percent">%</button>
    <button class="btn btn-op" data-action="op" data-op="/">&divide;</button>

    <button class="btn btn-num" data-action="num" data-num="7">7</button>
    <button class="btn btn-num" data-action="num" data-num="8">8</button>
    <button class="btn btn-num" data-action="num" data-num="9">9</button>
    <button class="btn btn-op" data-action="op" data-op="*">&times;</button>

    <button class="btn btn-num" data-action="num" data-num="4">4</button>
    <button class="btn btn-num" data-action="num" data-num="5">5</button>
    <button class="btn btn-num" data-action="num" data-num="6">6</button>
    <button class="btn btn-op" data-action="op" data-op="-">&minus;</button>

    <button class="btn btn-num" data-action="num" data-num="1">1</button>
    <button class="btn btn-num" data-action="num" data-num="2">2</button>
    <button class="btn btn-num" data-action="num" data-num="3">3</button>
    <button class="btn btn-op" data-action="op" data-op="+">+</button>

    <button class="btn btn-num btn-zero" data-action="num" data-num="0">0</button>
    <button class="btn btn-num" data-action="decimal">.</button>
    <button class="btn btn-eq" data-action="equals">=</button>
  </div>

  <div class="hint">keyboard supported</div>
</div>

<script>
(function(){
  const $ = id => document.getElementById(id);
  const exprEl = $('expr');
  const valEl  = $('value');

  let current = '0';
  let previous = '';
  let operator = '';
  let resetNext = false;

  const opSymbols = {'/':'÷','*':'×','-':'−','+':'+'};

  function updateDisplay(){
    // size class
    valEl.classList.remove('small','xsmall');
    if(current.length > 10) valEl.classList.add('xsmall');
    else if(current.length > 7) valEl.classList.add('small');

    valEl.textContent = current;

    if(previous && operator){
      exprEl.textContent = formatNum(previous) + ' ' + opSymbols[operator];
    } else {
      exprEl.textContent = '';
    }
  }

  function formatNum(n){
    const num = parseFloat(n);
    if(isNaN(num)) return n;
    if(n.endsWith('.')) return n;
    // Don't format if user is still typing decimals
    if(n.includes('.') && n.split('.')[1].length > 0){
      return n;
    }
    return num.toLocaleString('en-US',{maximumFractionDigits:10});
  }

  function inputNum(n){
    if(current === 'Error') current = '0';
    if(resetNext){
      current = n;
      resetNext = false;
    } else {
      if(current === '0' && n !== '0') current = n;
      else if(current === '0' && n === '0') return;
      else if(current.replace(/[^0-9]/g,'').length >= 12) return;
      else current += n;
    }
    updateDisplay();
  }

  function inputDecimal(){
    if(resetNext){ current = '0.'; resetNext = false; }
    else if(!current.includes('.')) current += '.';
    updateDisplay();
  }

  function inputOp(op){
    if(current === 'Error'){ clear(); return; }
    if(previous && operator && !resetNext){
      calculate();
    }
    previous = current;
    operator = op;
    resetNext = true;
    highlightOp(op);
    updateDisplay();
  }

  function calculate(){
    if(!operator || !previous) return;
    const a = parseFloat(previous);
    const b = parseFloat(current);
    let result;

    switch(operator){
      case '+': result = a + b; break;
      case '-': result = a - b; break;
      case '*': result = a * b; break;
      case '/':
        if(b === 0){
          current = 'Error';
          previous = '';
          operator = '';
          resetNext = true;
          valEl.classList.add('shake');
          setTimeout(()=> valEl.classList.remove('shake'),400);
          updateDisplay();
          return;
        }
        result = a / b;
        break;
    }

    // Clean float artifacts
    result = parseFloat(result.toPrecision(12));
    current = String(result);
    exprEl.textContent = formatNum(previous) + ' ' + opSymbols[operator] + ' ' + formatNum(String(b)) + ' =';
    previous = '';
    operator = '';
    resetNext = true;
    clearOpHighlight();
    valEl.classList.remove('small','xsmall');
    if(current.length > 10) valEl.classList.add('xsmall');
    else if(current.length > 7) valEl.classList.add('small');
    valEl.textContent = current;
  }

  function clear(){
    current = '0';
    previous = '';
    operator = '';
    resetNext = false;
    clearOpHighlight();
    updateDisplay();
  }

  function toggleSign(){
    if(current === '0' || current === 'Error') return;
    current = current.startsWith('-') ? current.slice(1) : '-' + current;
    updateDisplay();
  }

  function percent(){
    if(current === 'Error') return;
    current = String(parseFloat(current) / 100);
    updateDisplay();
  }

  function highlightOp(op){
    clearOpHighlight();
    const btn = document.querySelector(`[data-op="${op}"]`);
    if(btn) btn.classList.add('active');
  }
  function clearOpHighlight(){
    document.querySelectorAll('.btn-op').forEach(b => b.classList.remove('active'));
  }

  // Ripple effect
  function createRipple(e, btn){
    const r = document.createElement('span');
    r.className = 'ripple';
    const rect = btn.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    r.style.width = r.style.height = size + 'px';
    r.style.left = (e.clientX - rect.left - size/2) + 'px';
    r.style.top  = (e.clientY - rect.top  - size/2) + 'px';
    btn.appendChild(r);
    r.addEventListener('animationend', ()=> r.remove());
  }

  // Click handler
  document.querySelector('.grid').addEventListener('click', function(e){
    const btn = e.target.closest('.btn');
    if(!btn) return;
    createRipple(e, btn);

    const action = btn.dataset.action;
    switch(action){
      case 'num':     inputNum(btn.dataset.num); break;
      case 'decimal': inputDecimal(); break;
      case 'op':      inputOp(btn.dataset.op); break;
      case 'equals':  calculate(); break;
      case 'clear':   clear(); break;
      case 'sign':    toggleSign(); break;
      case 'percent': percent(); break;
    }
  });

  // Keyboard support
  document.addEventListener('keydown', function(e){
    if(e.key >= '0' && e.key <= '9') inputNum(e.key);
    else if(e.key === '.') inputDecimal();
    else if(e.key === '+') inputOp('+');
    else if(e.key === '-') inputOp('-');
    else if(e.key === '*') inputOp('*');
    else if(e.key === '/'){e.preventDefault(); inputOp('/');}
    else if(e.key === 'Enter' || e.key === '=') calculate();
    else if(e.key === 'Escape' || e.key === 'c' || e.key === 'C') clear();
    else if(e.key === '%') percent();
    else if(e.key === 'Backspace'){
      if(current.length > 1 && !resetNext) current = current.slice(0,-1);
      else current = '0';
      updateDisplay();
    }
  });

  updateDisplay();
})();
</script>
</body>
</html>
